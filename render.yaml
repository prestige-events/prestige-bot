services:
  - type: web
    name: prestige-events-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1
    envVars:
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: APP_SECRET
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: APP_ID
        sync: false
