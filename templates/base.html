<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Events Bot - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .navbar {
            background: #1a1a2e;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            border-bottom: 2px solid #c9a84c;
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: bold;
            color: #c9a84c;
        }
        .navbar a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .navbar a:hover, .navbar a.active {
            color: #fff;
            background: rgba(201, 168, 76, 0.2);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }
        h1 { color: #c9a84c; margin-bottom: 20px; font-size: 28px; }
        h2 { color: #c9a84c; margin-bottom: 15px; font-size: 22px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
        }
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #c9a84c;
        }
        .stat-card .label {
            color: #888;
            margin-top: 5px;
            font-size: 14px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2a2a3e;
        }
        th {
            color: #c9a84c;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        td { font-size: 14px; }
        tr:hover { background: rgba(201, 168, 76, 0.05); }
        .tag {
            display: inline-block;
            background: rgba(201, 168, 76, 0.2);
            color: #c9a84c;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 2px;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: #c9a84c;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover { background: #d4b65a; transform: translateY(-1px); }
        .btn-secondary {
            background: transparent;
            color: #c9a84c;
            border: 1px solid #c9a84c;
        }
        .btn-secondary:hover { background: rgba(201, 168, 76, 0.1); }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            margin-top: 5px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #c9a84c;
        }
        label {
            display: block;
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .flash {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .flash.success {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .status-registered { color: #81c784; }
        .status-interested { color: #c9a84c; }
        .status-undecided { color: #e57373; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">PRESTIGE EVENTS BOT</div>
        <a href="/" class="{{ 'active' if active_page == 'dashboard' }}">Dashboard</a>
        <a href="/tournaments" class="{{ 'active' if active_page == 'tournaments' }}">Tornei</a>
        <a href="/contacts" class="{{ 'active' if active_page == 'contacts' }}">Contatti</a>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
