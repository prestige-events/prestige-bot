{% extends "base.html" %}
{% set active_page = "tournaments" %}

{% block content %}
<h1>Nuovo Torneo</h1>

<div class="card">
    <form method="POST">
        <div class="form-grid">
            <label>
                Nome torneo *
                <input type="text" name="name" required placeholder="Es: Saturday Night Poker">
            </label>
            <label>
                Keyword per Messenger *
                <input type="text" name="keyword" required placeholder="Es: SATURDAY" style="text-transform:uppercase;">
            </label>
            <label>
                Data *
                <input type="date" name="date" required>
            </label>
            <label>
                Orario *
                <input type="time" name="time" required>
            </label>
            <label>
                Buy-in
                <input type="text" name="buyin" placeholder="Es: €50">
            </label>
            <label>
                Re-entry
                <input type="text" name="reentry" placeholder="Es: €30">
            </label>
            <label>
                Garantito
                <input type="text" name="guaranteed" placeholder="Es: €5.000">
            </label>
            <label>
                Blinds (minuti)
                <input type="text" name="blinds" placeholder="Es: 20">
            </label>
        </div>
        <label>
            Descrizione
            <textarea name="description" rows="3" placeholder="Descrizione aggiuntiva del torneo..."></textarea>
        </label>

        <div style="margin-top:20px; display:flex; gap:10px;">
            <button type="submit" class="btn">Crea Torneo</button>
            <a href="/tournaments" class="btn btn-secondary">Annulla</a>
        </div>
    </form>
</div>
{% endblock %}
